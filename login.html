<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilot Authorization Gateway - Aviator</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@800;900&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-primary: #090a0f;
            --bg-panel: #12141d;
            --accent-red: #e50914;
            --accent-red-glow: rgba(229, 9, 20, 0.4);
            --accent-green: #22c55e;
            --accent-green-glow: rgba(34, 197, 94, 0.4);
            --text-white: #ffffff;
            --text-grey: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.35);
            --border-color: rgba(255, 255, 255, 0.08);
            --font-sans: 'Inter', sans-serif;
            --font-heading: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-sans);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            padding: 20px;
            overflow-y: auto;
        }

        .auth-container {
            width: 420px;
            max-width: 100%;
            margin: auto;
            background: rgba(18, 20, 29, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            position: relative;
            animation: modal-spring-in 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .brand-logo-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .logo-svg {
            fill: var(--accent-red);
            filter: drop-shadow(0 0 6px var(--accent-red-glow));
            animation: plane-hover 2.5s ease-in-out infinite;
        }

        .brand-name {
            font-family: var(--font-heading);
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--text-white);
        }

        .auth-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(0, 0, 0, 0.25);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .toggle-btn {
            padding: 10px 0;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-grey);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: 0.2s ease;
        }

        .toggle-btn.active {
            background: var(--bg-panel);
            color: #ffffff;
            border: 1px solid var(--border-color);
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 16px;
            animation: fade-slide 0.3s ease-out;
        }

        .auth-form.active {
            display: flex;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 14px 12px 42px;
            color: #ffffff;
            font-size: 13px;
            width: 100%;
            transition: 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--accent-red);
            background: rgba(229, 9, 20, 0.02);
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.15);
        }

        .submit-btn {
            width: 100%;
            background: var(--accent-red);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--accent-red-glow);
            transition: 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            box-shadow: 0 6px 20px var(--accent-red);
            transform: translateY(-1px);
        }

        /* Alert notifications */
        .alert-box {
            display: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 12px;
            line-height: 1.4;
            margin-bottom: 18px;
            animation: slide-down 0.2s ease-out;
        }

        .alert-box.error {
            background: rgba(198, 40, 40, 0.12);
            border: 1px solid rgba(198, 40, 40, 0.25);
            color: #ff5252;
            display: block;
        }

        .alert-box.success {
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.25);
            color: var(--accent-green);
            display: block;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes plane-hover {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-4px) rotate(1.5deg);
            }
        }

        @keyframes modal-spring-in {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes fade-slide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slide-down {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Frosted Glass Overlay Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .glass-panel {
            background: rgba(18, 20, 29, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            animation: modal-spring-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .close-modal-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal-btn:hover {
            color: #ffffff;
        }
    </style>
</head>

<body>

    <div class="auth-container">

        <div class="brand-logo-header">
            <svg class="logo-svg" width="40" height="40" viewBox="0 0 24 24">
                <path
                    d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L14 19v-5.5l8 2.5z" />
            </svg>
            <span class="brand-name">AVIATOR COCKPIT</span>
        </div>

        <div class="auth-toggle">
            <button class="toggle-btn active" id="btnToggleLogin">Sign In</button>
            <button class="toggle-btn" id="btnToggleRegister">Pilot Register</button>
        </div>

        <!-- System Alerts -->
        <div class="alert-box" id="authAlert"></div>

        <!-- 1. SIGN IN FORM -->
        <form class="auth-form active" id="loginForm">
            <div class="input-group">
                <label>Username, Email, or Phone</label>
                <div class="input-wrapper">
                    <i data-lucide="user" style="width: 16px; height: 16px;"></i>
                    <input type="text" class="input-field" placeholder="e.g. maverick99 or pilot@aviator.com" required
                        id="loginId">
                </div>
            </div>

            <div class="input-group">
                <label>Access Password</label>
                <div class="input-wrapper">
                    <i data-lucide="lock" style="width: 16px; height: 16px;"></i>
                    <input type="password" class="input-field" placeholder="••••••••" required id="loginPassword">
                </div>
            </div>

            <button type="submit" class="submit-btn">
                <span>AUTHORIZE ACCESS</span>
                <div class="spinner" id="loginSpinner"></div>
            </button>

            <div style="display:flex; justify-content:center; margin-top:8px; font-size:11px;">
                <span style="color:var(--text-muted)">Forgot credentials? </span>
                <a href="javascript:void(0)" onclick="openForgotCredentialsModal()"
                    style="color:var(--accent-red); font-weight:700; margin-left:4px; text-decoration:none; transition: opacity 0.2s ease;"
                    onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">Recover Access</a>
            </div>
        </form>

        <!-- 2. PILOT REGISTER FORM -->
        <form class="auth-form" id="registerForm">
            <div class="input-group">
                <label>Pilot Username</label>
                <div class="input-wrapper">
                    <i data-lucide="user" style="width: 16px; height: 16px;"></i>
                    <input type="text" class="input-field" placeholder="e.g. maverick99" required id="regUsername"
                        minlength="3">
                </div>
            </div>

            <div class="input-group">
                <label>Pilot Email Address</label>
                <div class="input-wrapper">
                    <i data-lucide="mail" style="width: 16px; height: 16px;"></i>
                    <input type="email" class="input-field" placeholder="e.g. fly@aviator.com" required id="regEmail">
                </div>
            </div>

            <div class="input-group">
                <label>Mobile Number Coordinates</label>
                <div class="input-wrapper">
                    <i data-lucide="phone" style="width: 16px; height: 16px;"></i>
                    <input type="tel" class="input-field" placeholder="e.g. 9876543210" required id="regPhone"
                        pattern="[0-9]{10}">
                </div>
            </div>

            <div class="input-group">
                <label>Create Secret Password</label>
                <div class="input-wrapper">
                    <i data-lucide="lock" style="width: 16px; height: 16px;"></i>
                    <input type="password" class="input-field" placeholder="Min 6 characters" required id="regPassword"
                        minlength="6">
                </div>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <i data-lucide="shield-check" style="width: 16px; height: 16px;"></i>
                    <input type="password" class="input-field" placeholder="••••••••" required id="regConfirmPassword"
                        minlength="6">
                </div>
            </div>

            <div class="input-group">
                <label>Bank AC & IFSC / UPI ID</label>
                <div class="input-wrapper">
                    <i data-lucide="landmark" style="width: 16px; height: 16px;"></i>
                    <input type="text" class="input-field" placeholder="e.g. HDFC 12345 or pilot@upi"
                        id="regBankDetails">
                </div>
            </div>

            <div class="input-group">
                <label>Referral Code (Optional)</label>
                <div class="input-wrapper">
                    <i data-lucide="gift" style="width: 16px; height: 16px;"></i>
                    <input type="text" class="input-field" placeholder="Referrer's Username or ID" id="regReferral">
                </div>
            </div>

            <button type="submit" class="submit-btn"
                style="background: var(--accent-green); color: #000; box-shadow: 0 4px 15px var(--accent-green-glow);">
                <span>CREATE PILOT ACCOUNT</span>
                <div class="spinner" id="regSpinner"></div>
            </button>
        </form>

    </div>

    <!-- Frosted Recover Credentials modal -->
    <div class="modal-overlay" id="forgotCredentialsModal">
        <div class="glass-panel" style="width: 350px; padding: 24px; position: relative;">
            <button class="close-modal-btn" onclick="closeForgotCredentialsModal()">
                <i data-lucide="x" style="width: 20px; height: 20px;"></i>
            </button>
            <div class="brand-logo-header" style="margin-bottom: 16px;">
                <svg width="32" height="32" viewBox="0 0 24 24"
                    style="fill: var(--accent-red); filter: drop-shadow(0 0 6px var(--accent-red-glow));">
                    <path
                        d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6-5c1.66 0 3 1.34 3 3v2H9V6c0-1.66 1.34-3 3-3zm6 17H6V10h12v10z" />
                </svg>
                <span class="brand-name" style="font-size: 18px;">GATEWAY RECOVERY</span>
            </div>

            <div class="alert-box" id="forgotAlert" style="margin-bottom: 12px; font-size:11px;"></div>

            <div
                style="font-size: 12px; color: var(--text-grey); margin-bottom: 14px; text-align: center; line-height: 1.4;">
                Enter your registered Email Address or Phone Coordinates to fetch authorization status.
            </div>

            <div class="input-group" style="margin-bottom: 16px;">
                <label>Pilot Email or Phone</label>
                <div class="input-wrapper">
                    <i data-lucide="user-check" style="width: 16px; height: 16px;"></i>
                    <input type="text" class="input-field" placeholder="e.g. pilot@aviator.com or phone"
                        id="forgotEmailPhone">
                </div>
            </div>

            <!-- Result Area -->
            <div id="recoveryResultArea"
                style="display: none; background: rgba(34, 197, 94, 0.08); border: 1px solid rgba(34, 197, 94, 0.2); border-radius: 12px; padding: 12px; margin-bottom: 16px; font-size: 12px; animation: slide-down 0.25s ease-out;">
                <div style="color: var(--accent-green); font-weight: 800; text-align: center; margin-bottom: 8px;">✓
                    CREDENTIALS RETRIEVED</div>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <div><span style="opacity: 0.6;">Username:</span> <strong
                            style="color: #ffffff; word-break: break-all;" id="recoveredEmail"></strong></div>
                    <div><span style="opacity: 0.6;">Password:</span> <strong style="color: #ffffff;"
                            id="recoveredPassword"></strong></div>
                </div>
            </div>

            <button type="button" class="submit-btn" style="background: var(--accent-red); color: #ffffff;"
                onclick="recoverPilotCredentials()">
                RECOVER PILOT ACCESS
            </button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // ================================================================
        // FIREBASE AUTH + FIRESTORE INTEGRATION
        // ================================================================

        // Guard: ensure Firestore db is ready before any operation (mobile safety)
        function getDb() {
            if (typeof firebase === 'undefined') {
                throw new Error('Firebase SDK not loaded. Check your internet connection and reload.');
            }
            if (typeof db === 'undefined' || !db) {
                throw new Error('Firestore not initialized. Please reload the page.');
            }
            return db;
        }

        // ----------------------------------------------------------------
        // Seed localStorage with defaults so app.js works on first load
        // ----------------------------------------------------------------
        function preseedDb() {
            let users = JSON.parse(localStorage.getItem('aviator_db_users')) || [];

            // Ensure default pilot exists
            if (!users.some(u => u.email.toLowerCase() === 'pilot@aviator.com')) {
                users.push({
                    customerId: "1000000001",
                    username: "pilot",
                    email: "pilot@aviator.com",
                    phone: "9952254507",
                    bankDetails: "pilot@ybl",
                    password: "password123",
                    balance: 0.00,
                    joinDate: new Date().toLocaleString(),
                    status: "active"
                });
            }

            // Ensure Admin@admin exists
            if (!users.some(u => u.email.toLowerCase() === 'admin@admin')) {
                users.push({
                    email: "Admin@admin",
                    phone: "9999999999",
                    password: "admin",
                    balance: 100000.00,
                    joinDate: new Date().toLocaleString(),
                    status: "active"
                });
            }

            localStorage.setItem('aviator_db_users', JSON.stringify(users));

            if (!localStorage.getItem('aviator_txns')) {
                localStorage.setItem('aviator_txns', JSON.stringify([]));
            }
            if (!localStorage.getItem('aviator_activity_logs')) {
                localStorage.setItem('aviator_activity_logs', JSON.stringify([]));
            }
        }
        preseedDb();

        function logSessionActivity(email) {
            let logs = JSON.parse(localStorage.getItem('aviator_activity_logs')) || [];
            const sessionId = "sess-" + Date.now();
            logs.push({
                sessionId: sessionId,
                email: email,
                loginTime: new Date().toLocaleString(),
                logoutTime: null,
                duration: 0 // in seconds
            });
            localStorage.setItem('aviator_activity_logs', JSON.stringify(logs));
            localStorage.setItem('aviator_current_session_id', sessionId);
        }

        // Procedural success audio context chord
        function playSuccessChord() {
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContextClass();
                const now = audioCtx.currentTime;

                const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5 (C Major Chord)
                notes.forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();

                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.05);

                    gain.gain.setValueAtTime(0.12, now + idx * 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.05 + 0.4);

                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + idx * 0.05);
                    osc.stop(now + idx * 0.05 + 0.45);
                });
            } catch (e) { }
        }

        // Toggle triggers
        const btnToggleLogin = document.getElementById('btnToggleLogin');
        const btnToggleRegister = document.getElementById('btnToggleRegister');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const alertBox = document.getElementById('authAlert');

        btnToggleLogin.onclick = () => {
            btnToggleLogin.classList.add('active');
            btnToggleRegister.classList.remove('active');
            loginForm.classList.add('active');
            registerForm.classList.remove('active');
            alertBox.className = "alert-box";
            sessionStorage.setItem('aviator_auth_tab', 'login');
        };

        btnToggleRegister.onclick = () => {
            btnToggleRegister.classList.add('active');
            btnToggleLogin.classList.remove('active');
            registerForm.classList.add('active');
            loginForm.classList.remove('active');
            alertBox.className = "alert-box";
            sessionStorage.setItem('aviator_auth_tab', 'register');
        };

        // Restore tab on load
        if (sessionStorage.getItem('aviator_auth_tab') === 'register') {
            btnToggleRegister.click();
        }

        // ================================================================
        // SIGN IN — Queries Firestore, falls back to localStorage cache
        // ================================================================
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            alertBox.className = "alert-box";

            const loginId = document.getElementById('loginId').value.trim();
            const loginPass = document.getElementById('loginPassword').value;
            const spinner = document.getElementById('loginSpinner');
            const submitSpan = loginForm.querySelector('.submit-btn span');

            submitSpan.style.opacity = "0.5";
            spinner.style.display = "block";

            try {
                // --- Query Firestore for matching user ---
                const firestore = getDb();
                const snapshot = await firestore.collection("users")
                    .where("password", "==", loginPass)
                    .get();

                let matched = null;

                snapshot.forEach(doc => {
                    const u = doc.data();
                    const idMatch =
                        (u.email && u.email.toLowerCase() === loginId.toLowerCase()) ||
                        (u.phone && u.phone.trim() === loginId.trim()) ||
                        (u.username && u.username.toLowerCase() === loginId.toLowerCase());
                    if (idMatch) matched = u;
                });

                // --- Fallback: try localStorage if Firestore returned nothing ---
                if (!matched) {
                    const cachedUsers = JSON.parse(localStorage.getItem('aviator_db_users')) || [];
                    matched = cachedUsers.find(u =>
                        (u.email === loginId || u.phone === loginId ||
                         (u.username && u.username.toLowerCase() === loginId.toLowerCase())) &&
                        u.password === loginPass
                    );
                }

                spinner.style.display = "none";
                submitSpan.style.opacity = "1";

                if (!matched) {
                    alertBox.className = "alert-box error";
                    alertBox.textContent = "Invalid pilot email/phone or security access password.";
                    return;
                }

                if (matched.status === "banned") {
                    alertBox.className = "alert-box error";
                    alertBox.textContent = "Suspended! Your pilot credentials are blocklisted by flight control.";
                    return;
                }

                // --- Sync matched user into localStorage cache ---
                const cachedUsers = JSON.parse(localStorage.getItem('aviator_db_users')) || [];
                const existsIdx = cachedUsers.findIndex(u => u.email === matched.email);
                if (existsIdx === -1) {
                    cachedUsers.push(matched);
                } else {
                    cachedUsers[existsIdx] = matched;
                }
                localStorage.setItem('aviator_db_users', JSON.stringify(cachedUsers));

                // --- Authorize session ---
                localStorage.setItem('aviator_session', matched.email);
                localStorage.setItem('aviator_user', JSON.stringify(matched));
                logSessionActivity(matched.email);

                alertBox.className = "alert-box success";
                alertBox.textContent = "Authorization Granted! Redirecting to flight cockpit...";
                playSuccessChord();

                setTimeout(() => { window.location.href = "index.html"; }, 1200);

            } catch (err) {
                console.error("Login Firebase error:", err);
                spinner.style.display = "none";
                submitSpan.style.opacity = "1";
                alertBox.className = "alert-box error";
                alertBox.textContent = "Connection error: " + (err.message || "Could not reach secure database.");
            }
        };

        // ================================================================
        // PILOT REGISTER — Checks Firestore for duplicates, then saves
        // ================================================================
        registerForm.onsubmit = async (e) => {
            e.preventDefault();
            alertBox.className = "alert-box";

            const username = document.getElementById('regUsername').value.trim().toLowerCase();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const phone = document.getElementById('regPhone').value.trim();
            const pass = document.getElementById('regPassword').value;
            const confirmPass = document.getElementById('regConfirmPassword').value;
            const bankDetails = document.getElementById('regBankDetails').value.trim();
            const referralCode = document.getElementById('regReferral').value.trim().toLowerCase();
            const spinner = document.getElementById('regSpinner');
            const submitSpan = registerForm.querySelector('.submit-btn span');

            if (pass !== confirmPass) {
                alertBox.className = "alert-box error";
                alertBox.textContent = "Security confirmation mismatch. Passwords do not match.";
                return;
            }

            submitSpan.style.opacity = "0.5";
            spinner.style.display = "block";

            try {
                const firestore = getDb();

                // --- Check Firebase for duplicate email (doc ID = email) ---
                const emailDoc = await firestore.collection("users").doc(email).get();
                if (emailDoc.exists) {
                    spinner.style.display = "none";
                    submitSpan.style.opacity = "1";
                    alertBox.className = "alert-box error";
                    alertBox.textContent = "Duplicate registry! This email is already registered.";
                    return;
                }

                // --- Check Firebase for duplicate phone ---
                const phoneSnap = await firestore.collection("users").where("phone", "==", phone).get();
                if (!phoneSnap.empty) {
                    spinner.style.display = "none";
                    submitSpan.style.opacity = "1";
                    alertBox.className = "alert-box error";
                    alertBox.textContent = "Duplicate registry! This phone number is already registered.";
                    return;
                }

                // --- Check Firebase for duplicate username ---
                const unameSnap = await firestore.collection("users").where("username", "==", username).get();
                if (!unameSnap.empty) {
                    spinner.style.display = "none";
                    submitSpan.style.opacity = "1";
                    alertBox.className = "alert-box error";
                    alertBox.textContent = "Duplicate registry! This username is already taken.";
                    return;
                }

                // --- Generate 10-digit Customer ID ---
                const customerId = Math.floor(1000000000 + Math.random() * 9000000000).toString();

                // --- Process Referral Bonus (localStorage) ---
                let referralMsg = "";
                const users = JSON.parse(localStorage.getItem('aviator_db_users')) || [];
                if (referralCode !== "") {
                    const refIdx = users.findIndex(u =>
                        (u.username && u.username.toLowerCase() === referralCode) ||
                        u.customerId === referralCode
                    );
                    if (refIdx !== -1) {
                        users[refIdx].balance += 100.00;
                        // Also update referrer balance in Firestore
                        const refUser = users[refIdx];
                        await firestore.collection("users").doc(refUser.email).update({ balance: refUser.balance });
                        localStorage.setItem('aviator_sync_trigger', Date.now());
                        referralMsg = " Referrer credited ₹100 bonus!";
                    }
                }

                // --- Build new user object ---
                const newUser = {
                    customerId: customerId,
                    username: username,
                    email: email,
                    phone: phone,
                    bankDetails: bankDetails,
                    password: pass,
                    balance: 0.00,
                    joinDate: new Date().toLocaleString(),
                    status: "active"
                };

                // --- Save to Firestore (doc ID = email) ---
                await firestore.collection("users").doc(email).set(newUser);
                console.log("✅ User saved to Firestore:", email);

                // --- Sync to localStorage cache ---
                users.push(newUser);
                localStorage.setItem('aviator_db_users', JSON.stringify(users));

                // --- Authorize session ---
                localStorage.setItem('aviator_session', email);
                localStorage.setItem('aviator_user', JSON.stringify(newUser));
                logSessionActivity(email);

                alertBox.className = "alert-box success";
                alertBox.textContent = "Pilot Account Created!" + referralMsg + " Flying in...";
                playSuccessChord();

                setTimeout(() => { window.location.href = "index.html"; }, 1500);

            } catch (err) {
                console.error("Registration Firebase error:", err);
                spinner.style.display = "none";
                submitSpan.style.opacity = "1";
                alertBox.className = "alert-box error";
                alertBox.textContent = "Database Error: " + (err.message || "Could not save pilot record.");
            }
        };

        function openForgotCredentialsModal() {
            document.getElementById('forgotCredentialsModal').classList.add('active');
            document.getElementById('forgotAlert').style.display = 'none';
            document.getElementById('forgotEmailPhone').value = '';
            document.getElementById('recoveryResultArea').style.display = 'none';
        }

        function closeForgotCredentialsModal() {
            document.getElementById('forgotCredentialsModal').classList.remove('active');
        }

        function recoverPilotCredentials() {
            const val = document.getElementById('forgotEmailPhone').value.trim().toLowerCase();
            const alertBox = document.getElementById('forgotAlert');
            const resultArea = document.getElementById('recoveryResultArea');

            if (!val) {
                alertBox.className = "alert-box error";
                alertBox.textContent = "Please enter your registered phone number or email.";
                alertBox.style.display = "block";
                return;
            }

            const users = JSON.parse(localStorage.getItem('aviator_db_users')) || [];
            const found = users.find(u => u.email.toLowerCase() === val || (u.phone && u.phone.trim() === val));

            if (found) {
                alertBox.style.display = "none";
                resultArea.style.display = "block";
                document.getElementById('recoveredEmail').textContent = found.email;
                document.getElementById('recoveredPassword').textContent = found.password;
            } else {
                resultArea.style.display = "none";
                alertBox.className = "alert-box error";
                alertBox.textContent = "Security Purge: No pilot registry matches these coordinates.";
                alertBox.style.display = "block";
            }
        }

        // Close Modal on overlay click
        document.getElementById('forgotCredentialsModal').onclick = (e) => {
            if (e.target === document.getElementById('forgotCredentialsModal')) {
                closeForgotCredentialsModal();
            }
        };

        // Init icons
        lucide.createIcons();
    </script>
</body>

</html>
