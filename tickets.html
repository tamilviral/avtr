<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilot Help & Support Desk - Aviator</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-primary: #090a0f;
            --bg-panel: #12141d;
            --bg-panel-light: #1b1e2a;
            --accent-red: #e50914;
            --accent-red-glow: rgba(229, 9, 20, 0.4);
            --accent-green: #22c55e;
            --accent-green-glow: rgba(34, 197, 94, 0.4);
            --text-white: #ffffff;
            --text-grey: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.35);
            --border-color: rgba(255, 255, 255, 0.08);
            --font-sans: 'Inter', sans-serif;
            --font-heading: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-sans);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .tickets-container {
            width: 780px;
            max-width: 100%;
            background: rgba(18, 20, 29, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
            animation: spring-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tickets-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo svg {
            fill: var(--accent-red);
            filter: drop-shadow(0 0 6px var(--accent-red-glow));
        }

        .header-left h1 {
            font-family: var(--font-heading);
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-white);
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s ease;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(-1px);
        }

        .workspace-grid {
            display: grid;
            grid-template-columns: 1.1fr 1.3fr;
            gap: 28px;
        }

        .form-section {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .section-title {
            font-family: var(--font-heading);
            font-size: 16px;
            font-weight: 800;
            color: var(--text-white);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .input-field, .select-field, .textarea-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 14px;
            color: #ffffff;
            font-size: 12px;
            width: 100%;
            transition: 0.2s ease;
        }

        .select-field option {
            background: var(--bg-panel);
            color: #ffffff;
        }

        .input-field:focus, .select-field:focus, .textarea-field:focus {
            border-color: var(--accent-red);
            background: rgba(229, 9, 20, 0.02);
        }

        .submit-btn {
            background: var(--accent-red);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--accent-red-glow);
            transition: 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
        }

        .submit-btn:hover {
            box-shadow: 0 6px 16px var(--accent-red);
            transform: translateY(-1px);
        }

        /* Ticket History grid */
        .history-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ticket-list-wrapper {
            flex: 1;
            max-height: 420px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 6px;
        }

        .ticket-list-wrapper::-webkit-scrollbar {
            width: 4px;
        }

        .ticket-list-wrapper::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }

        .ticket-card {
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: 0.2s ease;
        }

        .ticket-card:hover {
            border-color: rgba(255,255,255,0.15);
        }

        .ticket-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .badge-status {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 800;
        }

        .badge-status.pending {
            background: rgba(255, 179, 0, 0.15);
            color: #ffb300;
            border: 1px solid rgba(255, 179, 0, 0.2);
        }

        .badge-status.resolved {
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .ticket-subject {
            font-weight: 800;
            font-size: 13px;
            color: #ffffff;
        }

        .ticket-message {
            font-size: 11px;
            color: var(--text-grey);
            line-height: 1.45;
        }

        .ticket-reply-box {
            background: rgba(34, 197, 94, 0.04);
            border: 1px solid rgba(34, 197, 94, 0.15);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            color: rgba(255,255,255,0.9);
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .ticket-reply-box strong {
            color: var(--accent-green);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 200px;
            color: var(--text-muted);
            gap: 10px;
        }

        @keyframes spring-in {
            from { opacity: 0; transform: scale(0.95) translateY(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media (max-width: 768px) {
            .workspace-grid {
                grid-template-columns: 1fr;
                gap: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="tickets-container">
        
        <!-- Header -->
        <div class="tickets-header">
            <div class="header-left">
                <div class="header-logo">
                    <svg width="30" height="30" viewBox="0 0 24 24">
                        <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L14 19v-5.5l8 2.5z"/>
                    </svg>
                </div>
                <h1>Pilot Ground Support</h1>
            </div>
            <button class="btn-back" onclick="window.location.href = 'index.html'">
                <i data-lucide="arrow-left" style="width: 12px; height: 12px;"></i>
                <span>Cockpit</span>
            </button>
        </div>

        <!-- Workplace Grid -->
        <div class="workspace-grid">
            
            <!-- Left: Create Ticket -->
            <div class="form-section">
                <div class="section-title">
                    <i data-lucide="plus-circle" style="width: 16px; height: 16px; color: var(--accent-red);"></i>
                    <span>Log support ticket</span>
                </div>
                
                <form id="ticketForm" style="display: flex; flex-direction: column; gap: 14px;">
                    <div class="input-group">
                        <label>Category Coordinates</label>
                        <select class="select-field" id="ticketCategory" required>
                            <option value="Deposit">Deposit Dispute</option>
                            <option value="Withdrawal">Withdrawal Bank Payout</option>
                            <option value="Bug">Technical Cockpit Bug</option>
                            <option value="Security">Account Security</option>
                            <option value="General">General Inquiry</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Support Subject</label>
                        <input type="text" class="input-field" placeholder="Brief subject summary" required id="ticketSubject">
                    </div>

                    <div class="input-group">
                        <label>Explain Message Details</label>
                        <textarea class="textarea-field" rows="5" placeholder="Explain your situation in details..." required id="ticketMessage" style="resize: none;"></textarea>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i data-lucide="send" style="width: 14px; height: 14px;"></i>
                        <span>TRANSMIT TICKET</span>
                    </button>
                </form>
            </div>

            <!-- Right: Tickets History list -->
            <div class="history-section">
                <div class="section-title">
                    <i data-lucide="history" style="width: 16px; height: 16px; color: var(--accent-green);"></i>
                    <span>Transmissions History</span>
                </div>

                <div class="ticket-list-wrapper" id="ticketList">
                    <!-- Populated dynamically via JS -->
                </div>
            </div>

        </div>

    </div>

    <script>
        let currentUser = null;

        // Security Gate check session
        function checkSecurityAuth() {
            const session = localStorage.getItem('aviator_session');
            if (!session) {
                window.location.href = "login.html";
                return;
            }
            const users = JSON.parse(localStorage.getItem('aviator_db_users')) || [];
            currentUser = users.find(u => u.email === session || u.phone === session);
            if (!currentUser) {
                localStorage.removeItem('aviator_session');
                window.location.href = "login.html";
            }
        }
        checkSecurityAuth();

        // -------------------------------------------------------------
        // TICKETS DATA & LISTING ENGINE
        // -------------------------------------------------------------
        function populateTicketsHistoryList() {
            const list = document.getElementById('ticketList');
            if (!list) return;

            list.innerHTML = "";
            const tickets = JSON.parse(localStorage.getItem('aviator_tickets')) || [];
            const myTickets = tickets.filter(t => t.email === currentUser.email).reverse();

            if (myTickets.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="help-circle" style="width: 32px; height: 32px;"></i>
                        <div style="font-size: 12px; font-weight: 700;">No support tickets logged.</div>
                        <div style="font-size: 10px;">Fill the form on the left if you require assistance.</div>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            myTickets.forEach(t => {
                const card = document.createElement('div');
                card.className = "ticket-card";

                const isResolved = t.status === "RESOLVED";
                const badgeClass = isResolved ? "badge-status resolved" : "badge-status pending";

                let replyHtml = "";
                if (isResolved && t.reply) {
                    replyHtml = `
                        <div class="ticket-reply-box">
                            <strong>Ground Control Response:</strong>
                            <span>${t.reply}</span>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="ticket-card-header">
                        <span>#${t.ticketId.toUpperCase()}</span>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span>${t.date.split(',')[0]}</span>
                            <span class="${badgeClass}">${t.status}</span>
                        </div>
                    </div>
                    <div style="font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--accent-red); letter-spacing: 0.5px;">
                        Category: ${t.category}
                    </div>
                    <div class="ticket-subject">${t.subject}</div>
                    <div class="ticket-message">${t.msg}</div>
                    ${replyHtml}
                `;

                list.appendChild(card);
            });

            lucide.createIcons();
        }

        // Submitting ticket
        const form = document.getElementById('ticketForm');
        form.onsubmit = (e) => {
            e.preventDefault();

            const category = document.getElementById('ticketCategory').value;
            const subject = document.getElementById('ticketSubject').value.trim();
            const message = document.getElementById('ticketMessage').value.trim();

            const tickets = JSON.parse(localStorage.getItem('aviator_tickets')) || [];
            
            const newTicketId = "tkt-" + Math.floor(Math.random() * 8999 + 1000) + "-" + Date.now().toString().slice(-3);

            const newTicket = {
                ticketId: newTicketId,
                email: currentUser.email,
                category: category,
                subject: subject,
                msg: message,
                status: "OPEN",
                reply: "",
                date: new Date().toLocaleString()
            };

            tickets.push(newTicket);
            localStorage.setItem('aviator_tickets', JSON.stringify(tickets));

            form.reset();
            populateTicketsHistoryList();

            alert("Ticket transmitted! Ground control will resolve your inquiry shortly.");
        };

        // Load initially
        populateTicketsHistoryList();

        // Listen for tab syncs updates
        window.addEventListener('storage', (e) => {
            if (e.key === 'aviator_tickets') {
                populateTicketsHistoryList();
            }
        });

        // Init icons
        lucide.createIcons();
    </script>
</body>
</html>
